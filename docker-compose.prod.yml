# Production compose: baked images, persistent data, restart policies, auth on by default.
#
# Prerequisites: copy .env.example → .env and set secrets (JWT + bootstrap admin).
#
#   docker compose -f docker-compose.prod.yml --env-file .env up --build -d
#
# Optional Postgres:
#   Set POSTGRES_PASSWORD + P4NT3XIA_DATABASE_URL in .env, then:
#   docker compose -f docker-compose.prod.yml --env-file .env --profile postgres up --build -d

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_data:/app/data
    env_file:
      - .env
    environment:
      - P4NT3XIA_FFUF_WORDLIST=/app/tools/wordlists/common.txt
      - P4NT3XIA_HYDRA_WORDLIST=/app/tools/wordlists/passwords.txt
      - P4NT3XIA_CORS_ORIGINS=${P4NT3XIA_CORS_ORIGINS:-["http://localhost:3000","http://127.0.0.1:3000"]}
      - P4NT3XIA_AUTH_ENABLED=${P4NT3XIA_AUTH_ENABLED:-true}
      - P4NT3XIA_JWT_SECRET=${P4NT3XIA_JWT_SECRET:?Set P4NT3XIA_JWT_SECRET in .env}
      - P4NT3XIA_BOOTSTRAP_ADMIN_USER=${P4NT3XIA_BOOTSTRAP_ADMIN_USER:-admin}
      - P4NT3XIA_BOOTSTRAP_ADMIN_PASSWORD=${P4NT3XIA_BOOTSTRAP_ADMIN_PASSWORD:?Set P4NT3XIA_BOOTSTRAP_ADMIN_PASSWORD in .env}
      - P4NT3XIA_DATABASE_URL=${P4NT3XIA_DATABASE_URL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1:3000/",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    profiles: ["postgres"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-p4nt3xia}
      # Set a strong POSTGRES_PASSWORD in .env before --profile postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme-set-in-dotenv}
      POSTGRES_DB: ${POSTGRES_DB:-p4nt3xia}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-p4nt3xia}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  backend_data:
  postgres_data:
